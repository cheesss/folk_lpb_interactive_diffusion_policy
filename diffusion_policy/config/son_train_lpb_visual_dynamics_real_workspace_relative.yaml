defaults:
  - _self_
  - task: son_pick_and_place_tissue_lpb_dynamics_relative

name: train_lpb_visual_dynamics_real_relative
_target_: diffusion_policy.workspace.train_lpb_visual_dynamics_workspace.TrainLPBVisualDynamicsWorkspace

task_name: ${task.name}
num_hist: 1
num_pred: 1
frameskip: 6

reference_policy:
  checkpoint: /home/ws/path/to/base_policy_relative.ckpt
  use_ema: True

encoder:
  _target_: diffusion_policy.model.ood.lpb_resnet_encoder.LPBResNetEncoder

proprio_encoder:
  _target_: diffusion_policy.model.ood.lpb_proprio.LPBProprioceptiveEmbedding
  tubelet_size: 1

action_encoder:
  _target_: diffusion_policy.model.ood.lpb_proprio.LPBProprioceptiveEmbedding
  tubelet_size: 1

predictor:
  _target_: diffusion_policy.model.ood.lpb_vit_predictor.LPBViTPredictor
  depth: 6
  heads: 16
  mlp_dim: 2048
  dropout: 0.1
  emb_dropout: 0.0
  pool: mean

model:
  freeze_encoder: True
  proprio_emb_dim: 128
  action_emb_dim: 128
  net:
    _target_: diffusion_policy.model.ood.lpb_visual_dynamics_model.LPBVisualDynamicsModel
    image_size: ${task.original_img_size}
    num_hist: ${num_hist}
    num_pred: ${num_pred}
    train_encoder: False
    train_predictor: True
    use_layernorm: True

lpb:
  default_threshold: 1.0

dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: True
  pin_memory: True

val_dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: False
  pin_memory: True

optimizer:
  _target_: torch.optim.AdamW
  lr: 5.0e-4
  betas: [0.9, 0.999]
  weight_decay: 1.0e-6

training:
  device: cuda:0
  seed: 42
  num_epochs: 100
  checkpoint_every: 5

logging:
  project: diffusion_policy_lpb_visual_dynamics
  resume: False
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: val_loss
    mode: min
    k: 5
    format_str: 'epoch={epoch:04d}-val_loss={val_loss:.4f}.ckpt'

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
