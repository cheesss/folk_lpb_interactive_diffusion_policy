name: bimanual

camera_obs_latency: 0.125
robot_obs_latency: 0.0001
gripper_obs_latency: 0.02
dataset_frequeny: 0 #59.94
obs_down_sample_steps: 3 # 3, 1

low_dim_obs_horizon: 2
img_obs_horizon: 2
action_horizon: 16
ignore_proprioception: False

image_shape: [3, 224, 224]

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim
  obs:
    image0:
      shape: [3, 224, 224]
      horizon: ${task.img_obs_horizon} # int
      # latency_steps: 0 # float
      # down_sample_steps: ${task.obs_down_sample_steps} # int
      type: rgb
      ignore_by_policy: False

    image1:
      shape: [3, 224, 224]
      horizon: ${task.img_obs_horizon} # int
      # latency_steps: 0 # float
      # down_sample_steps: ${task.obs_down_sample_steps} # int
      type: rgb
      ignore_by_policy: False
    
    robot_pose_L:
      shape: [3]
      horizon: ${task.low_dim_obs_horizon} # int
      # latency_steps: ${eval:'(${task.camera_obs_latency} - ${task.robot_obs_latency}) * ${task.dataset_frequeny}'} # float
      # down_sample_steps: ${task.obs_down_sample_steps} # float
      type: low_dim
      ignore_by_policy: ${task.ignore_proprioception}

    robot_pose_R:
      shape: [3]
      horizon: ${task.low_dim_obs_horizon} # int
      # latency_steps: ${eval:'(${task.camera_obs_latency} - ${task.robot_obs_latency}) * ${task.dataset_frequeny}'} # float
      # down_sample_steps: ${task.obs_down_sample_steps} # float
      type: low_dim
      ignore_by_policy: ${task.ignore_proprioception}

    robot_quat_L:
      # convert_robomimic_to_replay에서 raw_shape으로 확인됨
      raw_shape: [4]
      shape: [6]
      horizon: ${task.low_dim_obs_horizon} # int
      # latency_steps: ${eval:'(${task.camera_obs_latency} - ${task.robot_obs_latency}) * ${task.dataset_frequeny}'} # float
      # down_sample_steps: ${task.obs_down_sample_steps} # float
      type: low_dim
      rotation_rep: rotation_6d
      ignore_by_policy: ${task.ignore_proprioception}
    
    robot_quat_R:
      # convert_robomimic_to_replay에서 raw_shape으로 확인됨
      raw_shape: [4]
      shape: [6]
      horizon: ${task.low_dim_obs_horizon} # int
      # latency_steps: ${eval:'(${task.camera_obs_latency} - ${task.robot_obs_latency}) * ${task.dataset_frequeny}'} # float
      # down_sample_steps: ${task.obs_down_sample_steps} # float
      type: low_dim
      rotation_rep: rotation_6d
      ignore_by_policy: ${task.ignore_proprioception}

  action: 
    shape: [18]
    horizon: ${task.action_horizon}
    # latency_steps: 0 # float
    # down_sample_steps: ${task.obs_down_sample_steps} # int
    rotation_rep: rotation_6d

task_name: &task_name bimanual
dataset_path: /home/son/universal_manipulation_interface/diffusion_umi_data_umi_6D.hdf5
pose_repr: &pose_repr
  obs_pose_repr: relative # abs or relative
  action_pose_repr: relative # abs or relative or delta

env_runner:
  _target_: diffusion_policy.env_runner.real_pusht_image_runner.RealPushTImageRunner

dataset:
  _target_: diffusion_policy.dataset.son_bimanual_replay_dataset.BimanualRobomimicReplayDataset
  shape_meta: *shape_meta
  horizon: ${horizon}
  dataset_path: ${task.dataset_path}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  use_cache: True
  pose_repr: *pose_repr
  seed: 42
  val_ratio: 0.00
